name: Docker SBOM Staging

on:
  workflow_call:
    secrets:
      LOG_ANALYTICS_WORKSPACE_ID:
        required: true
      LOG_ANALYTICS_WORKSPACE_KEY:
        required: true
      COMPOSER_GITHUB_TOKEN:
        required: true
      WPML_USER_ID:
        required: true
      WPML_KEY:
        required: true

permissions:
  contents: write

jobs:
  docker-sbom:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        include:
          - image: "wordpress"
            path: "wordpress/docker/Dockerfile"
          - image: "apache"
            path: "wordpress/docker/apache/Dockerfile"

    steps:
    - name: Audit DNS requests
      uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
      env:
        DNS_PROXY_FORWARDTOSENTINEL: "true"
        DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
        DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
        DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
        DNS_PROXY_WILDCARDGREEDY: "true"

    - name: Checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false

    - name: Add Composer auth credentials
      run: |
        cd wordpress
        composer config github-oauth.github.com ${{ secrets.COMPOSER_GITHUB_TOKEN }}

    - name: Build image
      run: |
        docker build \
        --platform linux/arm64 \
        --build-arg git_sha="$GITHUB_SHA" \
        --build-arg WPML_USER_ID="${{ secrets.WPML_USER_ID }}" \
        --build-arg WPML_KEY="${{ secrets.WPML_KEY }}" \
        --build-arg APACHE_KEY="APACHE_KEY" \
        --build-arg APACHE_CERT="APACHE_CERT" \
        -t "${{ matrix.image }}" \
        -f "${{ matrix.path }}" .

    - name: Docker generate SBOM
      uses: cds-snc/security-tools/.github/actions/generate-sbom@837a88b6337d4842543184c8eac97a8adac8f302 # v4.0.3
      env:
        TRIVY_DB_REPOSITORY: ${{ vars.TRIVY_DB_REPOSITORY }}
      with:
        docker_image: "${{matrix.image}}"
        dockerfile_path: "${{ matrix.path }}"
        platform: "linux/arm64"
        token: "${{ secrets.GITHUB_TOKEN }}"
