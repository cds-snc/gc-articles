
name: "Terraform security scan"

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform-security-scan.yml"      
  pull_request:
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform-security-scan.yml"

permissions:
  contents: read

jobs:
  terraform-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@f621ecfe2d83b0e2028c7e93f082812eb56d3743 # latest as of Sept 9, 2021
        with:
          directory: infrastructure/terragrunt/aws
          framework: terraform
          output_format: cli
          soft_fail: false
